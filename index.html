<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskYaar - Kaam Karo, Josh Se, Reward Ke Sath</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
<meta name="theme-color" content="#00B8A9">
<meta property="og:title" content="TaskYaar - Kaam Karo, Josh Se, Reward Ke Sath">
<meta property="og:description" content="Daily tasks complete karo, coins kamao, doston se connect ho, real-time chat karo. Bilkul free!">
<meta property="og:type" content="website">
<meta name="description" content="TaskYaar - Networking + Task Reward App. Tasks karo, coins kamao, dost banao, chat karo.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TaskYaar">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22TaskYaar%22%2C%22short_name%22%3A%22TaskYaar%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23FFF9F0%22%2C%22theme_color%22%3A%22%2300B8A9%22%7D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --teal:#00B8A9;
    --teal-dark:#019283;
    --mango:#FFB800;
    --coral:#FF6B6B;
    --purple:#6C5CE7;
    --navy:#1B3A4B;
    --cream:#FFF9F0;
    --white:#ffffff;
    --line:#E9E2D4;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;}
  html,body{
    font-family:'Nunito',sans-serif;
    background:var(--cream);
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3,.brand,.tab-label,.section-title{font-family:'Baloo 2',cursive;}
  button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;}
  input,textarea,select{font-family:'Nunito',sans-serif;}
  img,svg{max-width:100%;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--cream);padding-bottom:78px;}

  /* ---------- AUTH ---------- */
  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px;background:
    radial-gradient(circle at 15% 10%, rgba(255,184,0,.28), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(108,92,231,.25), transparent 45%),
    var(--cream);
  }
  .auth-logo{text-align:center;margin-bottom:6px;}
  .auth-logo .emoji-stack{font-size:52px;line-height:1;}
  .brand{font-size:34px;font-weight:800;color:var(--navy);text-align:center;margin:6px 0 2px;letter-spacing:.5px;}
  .brand span{color:var(--teal);}
  .tagline{text-align:center;color:#6b7d84;font-weight:700;margin-bottom:28px;font-size:14.5px;}
  .card{background:var(--white);border-radius:24px;padding:24px 20px;box-shadow:0 10px 30px rgba(27,58,75,.08);border:2px solid var(--line);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-weight:800;font-size:13px;margin-bottom:6px;color:var(--navy);}
  .field input, .field select, .field textarea{
    width:100%;padding:13px 14px;border:2px solid var(--line);border-radius:14px;font-size:15px;font-weight:700;
    background:#FCFAF5;color:var(--navy);outline:none;transition:border .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--teal);}
  .avatar-picker{display:flex;flex-wrap:wrap;gap:8px;}
  .avatar-opt{font-size:26px;padding:8px 10px;border-radius:12px;border:2px solid var(--line);background:#FCFAF5;}
  .avatar-opt.selected{border-color:var(--teal);background:rgba(0,184,169,.12);}
  .btn-primary{
    width:100%;padding:14px;border-radius:16px;background:var(--teal);color:#fff;font-weight:800;font-size:16px;
    box-shadow:0 6px 0 var(--teal-dark);transition:transform .08s;
  }
  .btn-primary:active{transform:translateY(4px);box-shadow:0 2px 0 var(--teal-dark);}
  .btn-secondary{
    width:100%;padding:13px;border-radius:16px;background:transparent;color:var(--teal-dark);font-weight:800;font-size:14.5px;margin-top:10px;
  }
  .switch-line{text-align:center;margin-top:16px;font-weight:700;font-size:14px;color:#6b7d84;}
  .switch-line a{color:var(--coral);font-weight:800;text-decoration:none;}
  .error-msg{background:#FFE9E9;color:#C0392B;border:2px solid #FFC9C9;padding:9px 12px;border-radius:12px;font-weight:700;font-size:13px;margin-bottom:12px;display:none;}

  /* ---------- TOP HEADER ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 14px;background:var(--white);border-bottom:2px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  .topbar .brand-mini{font-size:20px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:6px;}
  .stat-pill{display:flex;align-items:center;gap:6px;background:#FCFAF5;border:2px solid var(--line);padding:6px 10px;border-radius:20px;font-weight:800;font-size:13.5px;}
  .stat-row{display:flex;gap:8px;align-items:center;}
  .bell-btn{background:#FCFAF5;border:2px solid var(--line);width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;flex-shrink:0;}
  .bell-badge{position:absolute;top:-5px;right:-5px;background:var(--coral);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  .notif-row{display:flex;gap:10px;align-items:flex-start;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px;}
  .notif-row.unread{border-color:var(--teal);background:rgba(0,184,169,.05);}
  .notif-icon{font-size:20px;width:38px;height:38px;background:#FCFAF5;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .notif-text{font-size:13.5px;font-weight:700;line-height:1.4;flex:1;}
  .notif-text b{color:var(--navy);}
  .notif-time{font-size:11px;color:#93a1a6;font-weight:700;margin-top:3px;}
  .post-delete-btn{background:none;color:#c9d0d3;font-size:15px;margin-left:auto;padding:2px 6px;}
  .share-box{background:linear-gradient(135deg,var(--purple),#8a7cf0);border-radius:18px;padding:16px;margin-bottom:16px;color:#fff;}
  .share-box .st{font-weight:800;font-size:14.5px;margin-bottom:8px;}
  .share-btn{background:rgba(255,255,255,.2);color:#fff;font-weight:800;padding:9px 16px;border-radius:12px;font-size:13px;border:2px solid rgba(255,255,255,.4);}
  .pro-badge{background:linear-gradient(135deg,var(--purple),#8a7cf0);color:#fff;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:10px;vertical-align:middle;white-space:nowrap;}
  .pro-box{background:linear-gradient(135deg,#1B3A4B,#2d5266);border-radius:20px;padding:18px;margin-bottom:16px;color:#fff;}
  .pro-box .pt{font-size:17px;font-weight:800;margin-bottom:6px;}
  .pro-box ul{margin:8px 0 14px;padding-left:18px;font-size:13px;font-weight:700;line-height:1.9;color:#cfe0e6;}
  .pro-box .price{font-size:22px;font-weight:800;color:var(--mango);margin-bottom:10px;}
  .pro-pay-info{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 12px;font-size:12.5px;font-weight:700;margin-bottom:12px;line-height:1.6;}
  .admin-link-btn{width:100%;padding:12px;border-radius:14px;background:var(--navy);color:#fff;font-weight:800;margin-bottom:10px;}
  .admin-section-title{font-weight:800;font-size:15px;margin:18px 0 10px;color:var(--navy);}
  .admin-form{background:var(--white);border:2px solid var(--line);border-radius:16px;padding:14px;margin-bottom:16px;}
  .sponsor-card{background:var(--white);border:2px solid var(--mango);border-radius:18px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;position:relative;}
  .sponsor-tag{position:absolute;top:-9px;left:12px;background:var(--mango);color:#5c3d00;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;}
  .admin-row{display:flex;align-items:center;gap:10px;background:var(--white);border:2px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:8px;}
  .admin-row .rinfo{flex:1;font-size:12.5px;font-weight:700;}
  .admin-row .rinfo b{font-size:13.5px;}
  .mini-btn{font-size:12px;font-weight:800;padding:7px 11px;border-radius:10px;}
  .mini-btn.approve{background:#B7EFC5;color:#1c7a3a;}
  .mini-btn.reject{background:#FFD3D3;color:#c0392b;}
  .mini-btn.del{background:#FFD3D3;color:#c0392b;}
  .mini-btn.toggle{background:#E9E2D4;color:var(--navy);}
  .friend-btn.report{background:none;color:#c9d0d3;font-size:15px;padding:6px 8px;}
  .banned-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 26px;text-align:center;background:var(--cream);}
  .coin-pill{color:#B8860B;}
  .streak-pill{color:var(--coral);}

  /* ---------- SECTIONS ---------- */
  .section{display:none;padding:16px 16px 6px;animation:fadein .25s ease;}
  .section.active{display:block;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .section-title{font-size:21px;font-weight:800;margin:4px 0 14px;}

  /* ---------- FEED ---------- */
  .composer{background:var(--white);border:2px solid var(--line);border-radius:20px;padding:14px;margin-bottom:16px;}
  .composer textarea{resize:none;min-height:60px;border:none;background:transparent;padding:4px;font-size:15px;font-weight:700;}
  .composer textarea:focus{outline:none;}
  .composer-actions{display:flex;justify-content:flex-end;margin-top:6px;}
  .btn-post{background:var(--coral);color:#fff;font-weight:800;padding:9px 20px;border-radius:14px;box-shadow:0 4px 0 #d94f4f;font-size:14px;}
  .btn-post:active{transform:translateY(3px);box-shadow:none;}
  .post-card{background:var(--white);border:2px solid var(--line);border-radius:20px;padding:14px;margin-bottom:14px;}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .post-avatar{font-size:28px;width:42px;height:42px;border-radius:50%;background:#FCFAF5;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
  .post-name{font-weight:800;font-size:14.5px;}
  .post-time{font-size:12px;color:#93a1a6;font-weight:700;}
  .post-text{font-size:15px;font-weight:700;line-height:1.5;margin:6px 0 10px;color:var(--navy);}
  .post-actions{display:flex;gap:16px;border-top:2px solid var(--line);padding-top:10px;}
  .post-actions button{background:none;color:#6b7d84;font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:5px;}
  .post-actions button.liked{color:var(--coral);}
  .comment-box{margin-top:10px;display:none;}
  .comment-box.open{display:block;}
  .comment-item{font-size:13.5px;font-weight:700;background:#FCFAF5;padding:7px 10px;border-radius:10px;margin-top:6px;}
  .comment-item b{color:var(--teal-dark);}
  .comment-input-row{display:flex;gap:8px;margin-top:8px;}
  .comment-input-row input{flex:1;padding:9px 12px;border-radius:12px;border:2px solid var(--line);font-size:13.5px;font-weight:700;}
  .comment-input-row button{background:var(--teal);color:#fff;padding:0 14px;border-radius:12px;font-weight:800;font-size:13px;}
  .empty-state{text-align:center;padding:40px 20px;color:#93a1a6;font-weight:700;}
  .empty-state .big-emoji{font-size:44px;display:block;margin-bottom:10px;}

  /* ---------- TASKS ---------- */
  .streak-banner{background:linear-gradient(135deg,var(--mango),#ffcf4d);border-radius:20px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;color:#5c3d00;}
  .streak-banner .big{font-size:26px;font-weight:800;}
  .task-card{background:var(--white);border:2px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
  .task-card.done{opacity:.55;}
  .task-emoji{font-size:26px;width:46px;height:46px;background:#FCFAF5;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .task-body{flex:1;}
  .task-title{font-weight:800;font-size:14.5px;}
  .task-reward{font-size:12.5px;font-weight:800;color:#B8860B;margin-top:2px;}
  .task-btn{background:var(--purple);color:#fff;font-weight:800;font-size:12.5px;padding:9px 14px;border-radius:12px;box-shadow:0 4px 0 #5647c2;white-space:nowrap;}
  .task-btn:active{transform:translateY(3px);box-shadow:none;}
  .task-btn.done-btn{background:#B7EFC5;color:#1c7a3a;box-shadow:none;}

  /* ---------- LEADERBOARD ---------- */
  .lb-row{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px;}
  .lb-rank{font-weight:800;font-size:16px;width:26px;text-align:center;color:#93a1a6;}
  .lb-rank.top1{color:#FFB800;font-size:20px;}
  .lb-rank.top2{color:#B0B0B0;font-size:18px;}
  .lb-rank.top3{color:#CD7F32;font-size:18px;}
  .lb-avatar{font-size:24px;width:38px;height:38px;background:#FCFAF5;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
  .lb-name{font-weight:800;font-size:14px;flex:1;}
  .lb-coins{font-weight:800;color:#B8860B;font-size:13.5px;}
  .lb-you{border-color:var(--teal);background:rgba(0,184,169,.06);}

  /* ---------- PROFILE ---------- */
  .profile-head{text-align:center;padding:10px 0 18px;}
  .profile-avatar{font-size:56px;width:96px;height:96px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:3px solid var(--teal);}
  .profile-name{font-size:20px;font-weight:800;}
  .owner-badge{background:linear-gradient(135deg,var(--mango),#ffd166);color:#5c3d00;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:10px;vertical-align:middle;white-space:nowrap;}
  .profile-bio{font-size:13.5px;color:#6b7d84;font-weight:700;margin-top:4px;padding:0 20px;}
  .profile-badges{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .badge-chip{background:var(--white);border:2px solid var(--line);border-radius:12px;padding:5px 10px;font-size:12px;font-weight:800;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
  .stat-box{background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center;}
  .stat-box .num{font-size:18px;font-weight:800;color:var(--teal-dark);}
  .stat-box .lbl{font-size:11px;font-weight:700;color:#93a1a6;}
  .profile-section-label{font-weight:800;font-size:14px;margin:16px 0 8px;color:var(--navy);}
  .btn-outline{width:100%;padding:12px;border-radius:14px;border:2px solid var(--line);background:var(--white);font-weight:800;color:var(--navy);margin-bottom:10px;}
  .btn-danger{width:100%;padding:12px;border-radius:14px;background:transparent;color:var(--coral);font-weight:800;border:2px solid #FFD3D3;}

  /* ---------- FRIENDS ---------- */
  .friend-row{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:11px 14px;margin-bottom:10px;}
  .friend-name{font-weight:800;font-size:14px;flex:1;}
  .friend-btn{font-weight:800;font-size:12.5px;padding:8px 13px;border-radius:12px;}
  .friend-btn.add{background:var(--teal);color:#fff;}
  .friend-btn.added{background:#EAEAEA;color:#93a1a6;}
  .friend-btn.msg{background:var(--purple);color:#fff;margin-left:6px;}
  .friend-actions{display:flex;align-items:center;}
  .search-bar{width:100%;padding:12px 14px;border-radius:14px;border:2px solid var(--line);font-weight:700;margin-bottom:14px;font-size:14px;background:var(--white);}

  /* ---------- CHAT ---------- */
  .chat-list-row{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px;position:relative;}
  .chat-list-row .post-avatar{width:44px;height:44px;font-size:22px;flex-shrink:0;}
  .chat-info{flex:1;min-width:0;}
  .chat-name-row{display:flex;justify-content:space-between;align-items:center;}
  .chat-name{font-weight:800;font-size:14.5px;}
  .chat-time{font-size:11px;color:#93a1a6;font-weight:700;}
  .chat-preview{font-size:12.5px;color:#8a969a;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;}
  .unread-dot{background:var(--coral);color:#fff;font-size:10.5px;font-weight:800;min-width:19px;height:19px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;}
  .nav-icon-wrap{position:relative;display:inline-block;}
  .nav-badge{position:absolute;top:-4px;right:-8px;background:var(--coral);color:#fff;font-size:9px;font-weight:800;min-width:14px;height:14px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

  /* thread view */
  .thread-header{display:flex;align-items:center;gap:10px;padding:2px 0 14px;border-bottom:2px solid var(--line);margin-bottom:12px;}
  .back-btn{background:var(--white);border:2px solid var(--line);width:36px;height:36px;border-radius:12px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .thread-avatar{font-size:24px;width:38px;height:38px;background:#FCFAF5;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
  .thread-name{font-weight:800;font-size:15px;}
  .thread-messages{display:flex;flex-direction:column;gap:8px;padding-bottom:12px;}
  .msg-bubble{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14px;font-weight:700;line-height:1.4;word-wrap:break-word;}
  .msg-mine{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:4px;}
  .msg-theirs{align-self:flex-start;background:var(--white);border:2px solid var(--line);color:var(--navy);border-bottom-left-radius:4px;}
  .msg-time{font-size:9.5px;font-weight:700;opacity:.65;margin-top:3px;display:block;}
  .chat-input-bar{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--white);border-top:2px solid var(--line);padding:10px 14px;display:flex;gap:8px;z-index:25;}
  .chat-input-bar input{flex:1;padding:11px 14px;border-radius:20px;border:2px solid var(--line);font-weight:700;font-size:14px;}
  .chat-send-btn{background:var(--coral);color:#fff;width:42px;height:42px;border-radius:50%;font-size:16px;flex-shrink:0;}
  .thread-body{padding-bottom:60px;}

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--white);border-top:2px solid var(--line);display:flex;z-index:30;
    padding:7px 2px calc(7px + env(safe-area-inset-bottom));
  }
  .nav-btn{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#B7C2C6;padding:5px 0;border-radius:12px;min-width:0;}
  .nav-btn .nav-icon{font-size:19px;}
  .nav-btn .tab-label{font-size:9.5px;font-weight:700;}
  .nav-btn.active{color:var(--teal-dark);}
  .nav-btn.active .tab-label{font-weight:800;}

  /* ---------- TOAST / CONFETTI ---------- */
  .toast{
    position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#fff;padding:12px 20px;border-radius:16px;font-weight:800;font-size:14px;
    opacity:0;transition:all .3s;z-index:100;max-width:90%;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .confetti-piece{position:fixed;top:-10px;font-size:18px;z-index:99;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0.2;}}

  return '';
}
function proTag(isPro){

function timeAgo(ts){
  const mins = Math.floor((Date.now()-ts)/60000);
  if(mins<1) return 'abhi';
  if(mins<60) return mins+'m pehle';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h pehle';

}

function firebaseErrorMsg(e){
  const code = e && e.code;
  if(code==='auth/email-already-in-use') return 'Ye username pehle se registered hai';
  if(code==='auth/weak-password') return 'Password kam se kam 6 characters ka ho';
  if(code==='auth/invalid-email') return 'Username mein sirf letters/numbers use karo';
  if(code==='auth/user-not-found' || code==='auth/wrong-password' || code==='auth/invalid-credential') return 'Username ya password ghalat hai';
  if(code==='auth/network-request-failed') return 'Internet connection check karo';
  return 'Kuch masla hua, dobara try karo';
}

function showBrowserNotification(title, body, emojiIcon){
  if(!('Notification' in window)) return;
  if(Notification.permission!=='granted') return;
  if(document.visibilityState==='visible' && currentTab==='chat') return; // already looking at chat, skip
  try{
    const n = new Notification(title, {body: body.slice(0,120), tag:'taskyaar-'+Date.now()});
    n.onclick = ()=>{ window.focus(); n.close(); };
  }catch(e){ /* non-fatal, some mobile browsers restrict direct Notification() */ }
}

async function requestNotifPermission(){
  if(!('Notification' in window)){ toast('Ye browser notifications support nahi karta'); return; }
  if(Notification.permission==='granted'){ toast('Notifications already on hain! 🔔'); return; }
  if(Notification.permission==='denied'){ toast('Notifications block hain — browser settings se manually on karo'); return; }
  try{
    const perm = await Notification.requestPermission();
    if(perm==='granted'){ toast('Notifications on ho gaye! 🔔🎉'); renderApp(); }
    else toast('Notifications on nahi hue');
  }catch(e){ toast('Kuch masla hua'); }
}

function toast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2200);
}
function confettiBurst(){
  const emojis = ['🎉','⭐','🪙','✨','🎊'];
  for(let i=0;i<18;i++){
    const el = document.createElement('div');
    el.className='confetti-piece';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'vw';
    el.style.animationDuration = (1.6+Math.random()*1.2)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
}

/* ============ AUTH SCREENS ============ */

function showAuthError(msg){
  const e = document.getElementById('errMsg');
  if(!e) return;
  e.textContent = msg;
  e.style.display = 'block';
}

function setAuthLoading(loading, label){
  const btn = document.getElementById('authBtn');
  if(!btn) return;
  authLoading = loading;
  btn.disabled = loading;
  btn.style.opacity = loading ? '0.6' : '1';
  if(loading) btn.textContent = label;
}

async function doLogin(){
  if(authLoading) return;
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  if(!u || !p){ showAuthError('Username aur password dono likho'); return; }
  showAuthError('');
  setAuthLoading(true, 'Login ho raha hai...');
  try{
    await auth.signInWithEmailAndPassword(usernameToEmail(u), p);
    // onAuthStateChanged will take over from here
  }catch(e){
    showAuthError(firebaseErrorMsg(e));
    setAuthLoading(false, 'Login Karo 🚀');
  }
}

async function doSignup(){
  if(authLoading) return;
  const name = document.getElementById('suName').value.trim();
  let uname = document.getElementById('suUser').value.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_.-]/g,'');
  const pass = document.getElementById('suPass').value;
  const refCode = (document.getElementById('suRef')?.value||'').trim().toLowerCase();
  if(!name || !uname || !pass){ showAuthError('Sab fields sahi se fill karo'); return; }
  if(pass.length<6){ showAuthError('Password kam se kam 6 characters ka ho'); return; }
  showAuthError('');
  setAuthLoading(true, 'Account ban raha hai...');
  try{
    const dupSnap = await db.collection('users').where('username','==',uname).limit(1).get();
    if(!dupSnap.empty){ showAuthError('Ye username pehle se maujood hai'); setAuthLoading(false,'Sign Up Karo ✨'); return; }

    let referrer = null;
    if(refCode && refCode!==uname){
      const refSnap = await db.collection('users').where('username','==',refCode).limit(1).get();
      if(!refSnap.empty) referrer = refSnap.docs[0].data();
    }

    const cred = await auth.createUserWithEmailAndPassword(usernameToEmail(uname), pass);
    const uid = cred.user.uid;
    const welcomeCoins = referrer ? REFERRAL_BONUS_NEWUSER : 0;
    await db.collection('users').doc(uid).set({
      uid, username:uname, name, avatar:selectedAvatar, bio:'Naya TaskYaar member!',
      coins:welcomeCoins, streak:1, lastLogin:todayStr(), friends:[], tasksDone:{}, sponsoredDone:[], isPro:false,
      referredBy: referrer ? referrer.uid : null, referralCount:0, referralEarnings:0, blockedUsers:[], createdAt:Date.now()
    });

    if(referrer){
      try{
        await db.collection('users').doc(referrer.uid).update({
          coins: FieldValue.increment(REFERRAL_BONUS_REFERRER),
          referralCount: FieldValue.increment(1),
          referralEarnings: FieldValue.increment(REFERRAL_BONUS_REFERRER)
        });
        await db.collection('notifications').add({
          toUid: referrer.uid, type:'referral', fromUid: uid, fromName: name, avatar: selectedAvatar,
          text: `ne aapke referral link se join kiya! +${REFERRAL_BONUS_REFERRER} coins 🎉`, time:Date.now(), read:false
        });
      }catch(e){ /* non-fatal */ }
    }
    // onAuthStateChanged will take over and render app
  }catch(e){
    showAuthError(firebaseErrorMsg(e));
    setAuthLoading(false, 'Sign Up Karo ✨');
  }
}

function doLogout(){
  if(unsubscribeChat) unsubscribeChat();
  if(unsubscribeUnread) unsubscribeUnread();
  currentUser = null;
  auth.signOut();
}

/* ============ AUTH STATE / STREAK ============ */
auth.onAuthStateChanged(async fbUser=>{
  if(fbUser){
    try{
      const doc = await db.collection('users').doc(fbUser.uid).get();
      if(!doc.exists){ renderAuth(); return; }
      const data = doc.data();
      if(data.banned){
        await auth.signOut();
        app.innerHTML = `
          <div class="banned-screen">
            <div style="font-size:48px;">🚫</div>
            <h2 style="color:var(--navy);">Account Suspend Kar Diya Gaya</h2>
            <p style="color:#6b7d84;font-weight:700;line-height:1.6;">
              Community guidelines follow na karne ki wajah se ye account suspend kiya gaya hai.
              Agar lagta hai ye galti hai, owner se WhatsApp pe rabta karo.
            </p>
          </div>`;
        return;
      }
      currentUser = data;
      await handleStreak();
      attachGlobalUnreadListener();
      attachGlobalNotifListener();
      currentTab = 'feed';
      renderApp();
    }catch(e){
      renderAuth();
    }
  } else {
    currentUser = null;
    renderAuth();
  }
});

async function handleStreak(){
  const today = todayStr();
  if(currentUser.lastLogin === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const newStreak = (currentUser.lastLogin === yesterday) ? (currentUser.streak||0)+1 : 1;
  try{
    await db.collection('users').doc(currentUser.uid).update({streak:newStreak, lastLogin:today});
    currentUser.streak = newStreak;
    currentUser.lastLogin = today;
  }catch(e){ /* non-fatal */ }
}

async function refreshCurrentUser(){
  const doc = await db.collection('users').doc(currentUser.uid).get();
  currentUser = doc.data();
}

async function switchTab(tab){

async function renderFeedSection(){
  const snap = await db.collection('posts').orderBy('time','desc').limit(50).get();
  const blocked = currentUser.blockedUsers||[];
  cachedPosts = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(p=>!blocked.includes(p.authorUid));
  return buildFeedHtml(cachedPosts);
}

function buildFeedHtml(posts){
  const postsHtml = posts.length ? posts.map(p=>renderPostCard(p)).join('') : `
    <div class="empty-state"><span class="big-emoji">📭</span>Abhi koi post nahi hai<br>Sabse pehle tum likho!</div>`;

        </div>
      </div>
      ${postsHtml}
    </div>

function renderPostCard(p){
  const liked = (p.likes||[]).includes(currentUser.uid);
  const isOpen = openComments[p.id];
  const comments = p.comments||[];
  const isOwner = currentUser.username && currentUser.username.toLowerCase()===OWNER_USERNAME;
  const canDelete = p.authorUid===currentUser.uid || isOwner;
  return `
    <div class="post-card">
      <div class="post-head">
        <div class="post-avatar clickable-avatar" onclick="viewUserProfile('${p.authorUid}')">${p.avatar}</div>
        <div style="flex:1;cursor:pointer;" onclick="viewUserProfile('${p.authorUid}')">
          <div class="post-name">${escapeHtml(p.authorName)}${nameTag(p.authorUsername, p.authorIsPro)}</div>
          <div class="post-time">${timeAgo(p.time)}</div>
        </div>
        ${canDelete ? `<button class="post-delete-btn" onclick="deletePost('${p.id}')">🗑️</button>` : ''}
      </div>
      <div class="post-text">${escapeHtml(p.text)}</div>
      <div class="post-actions">
        <button class="${liked?'liked':''}" onclick="toggleLike('${p.id}')">${liked?'❤️':'🤍'} ${(p.likes||[]).length}</button>
        <button onclick="toggleComments('${p.id}')">💬 ${comments.length}</button>
      </div>
      <div class="comment-box ${isOpen?'open':''}" id="cbox-${p.id}">
        ${comments.map(c=>`<div class="comment-item"><b>${escapeHtml(c.authorName)}:</b> ${escapeHtml(c.text)}</div>`).join('')}
        <div class="comment-input-row">
          <input id="cinput-${p.id}" placeholder="Comment likho...">
          <button onclick="submitComment('${p.id}')">Send</button>
        </div>
      </div>
    </div>
  `;
}

async function submitPost(){
  const el = document.getElementById('postText');
  const txt = el.value.trim();
  if(!txt) return;
  el.disabled = true;
  try{
    await db.collection('posts').add({authorUid:currentUser.uid, authorUsername:currentUser.username, authorIsPro:currentUser.isPro||false, authorName:currentUser.name, avatar:currentUser.avatar, text:txt, time:Date.now(), likes:[], comments:[]});
    await markTaskDone('t2', true);
    toast('Post ho gayi! 📢');
    renderApp();
  }catch(e){ toast('Post save nahi hui, dobara try karo'); el.disabled=false; }
}

async function deletePost(postId){
  if(!confirm('Ye post delete karni hai?')) return;
  try{
    await db.collection('posts').doc(postId).delete();

/* ============ TASKS ============ */
const DAY_MS = 24*60*60*1000;
function getTaskCooldownRemaining(taskId){
  const claims = currentUser.taskClaims || {};
  const last = claims[taskId];
  if(!last) return 0;
  const remaining = DAY_MS - (Date.now() - last);
  return remaining>0 ? remaining : 0;
}
function formatCooldown(ms){
  const totalMin = Math.max(1, Math.ceil(ms/60000));
  const h = Math.floor(totalMin/60);
  const m = totalMin%60;
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

async function markTaskDone(taskId, silent){
  if(!currentUser || getTaskCooldownRemaining(taskId)>0) return;
  const task = TASKS.find(t=>t.id===taskId);
  const rewardAmt = currentUser.isPro ? Math.round(task.reward*1.5) : task.reward;
  try{
    await db.collection('users').doc(currentUser.uid).update({
      [`taskClaims.${taskId}`]: Date.now(),
      coins: FieldValue.increment(rewardAmt)
    });
    await refreshCurrentUser();
    if(!silent){ confettiBurst(); toast(`+${rewardAmt} coins! ${task.title} complete ✅`); }
    if(!silent) renderApp();
  }catch(e){ /* non-fatal */ }
}

async function renderTasksSection(){
  const tasksHtml = TASKS.map(t=>{
    const remaining = getTaskCooldownRemaining(t.id);
    const locked = remaining>0;
    return `
      <div class="task-card ${locked?'done':''}">
        <div class="task-emoji">${t.emoji}</div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-reward">🪙 +${t.reward} coins</div>
        </div>
        ${locked
          ? `<div class="task-btn done-btn">⏳ ${formatCooldown(remaining)}</div>`
          : (t.id==='t1' || t.id==='t4' || t.id==='t6'
              ? `<button class="task-btn" onclick="quickCompleteTask('${t.id}')">Claim</button>`
              : `<div class="task-btn" style="background:#EAEAEA;color:#93a1a6;box-shadow:none;">Auto</div>`)
        }

    `;
  }).join('');
  let sponsoredHtml = '';

/* ============ FRIENDS / NETWORK ============ */
let sentRequestUids = [];
let receivedRequests = []; // {id, fromUid}

async function renderFriendsSection(){
  const [usersSnap, sentSnap, recvSnap] = await Promise.all([
    db.collection('users').get(),
    db.collection('friendRequests').where('fromUid','==',currentUser.uid).where('status','==','pending').get(),
    db.collection('friendRequests').where('toUid','==',currentUser.uid).where('status','==','pending').get()
  ]);
  cachedAllUsers = usersSnap.docs.map(d=>d.data()).filter(u=>u.uid!==currentUser.uid && !(currentUser.blockedUsers||[]).includes(u.uid));
  sentRequestUids = sentSnap.docs.map(d=>d.data().toUid);
  receivedRequests = recvSnap.docs.map(d=>({id:d.id, fromUid:d.data().fromUid}));
  return buildFriendsHtml(cachedAllUsers);
}

function buildFriendsHtml(list){
  const rowsHtml = list.map(u=>friendRowHtml(u)).join('') || `<div class="empty-state"><span class="big-emoji">🌱</span>Abhi koi aur user nahi hai</div>`;
  return `
    <div class="section active">
      <div class="section-title">Network Banao 🤝</div>
      <input class="search-bar" placeholder="Users dhoondo..." oninput="filterFriendsLocal(this.value)">
      <div id="friendsList">${rowsHtml}</div>
    </div>
  `;
}

function friendRowHtml(u){
  const isFriend = (currentUser.friends||[]).includes(u.uid);
  const requestedByMe = sentRequestUids.includes(u.uid);
  const theirRequest = receivedRequests.find(r=>r.fromUid===u.uid);
  let actionBtn;
  if(isFriend){
    actionBtn = `<button class="friend-btn added" onclick="removeFriend('${u.uid}')">Added ✓</button>`;
  } else if(theirRequest){
    actionBtn = `<button class="friend-btn add" onclick="acceptFriendRequest('${theirRequest.id}','${u.uid}')">Accept ✅</button>`;
  } else if(requestedByMe){
    actionBtn = `<button class="friend-btn added" onclick="cancelFriendRequest('${u.uid}')">Requested ⏳</button>`;
  } else {
    actionBtn = `<button class="friend-btn add" onclick="sendFriendRequest('${u.uid}')">+ Add</button>`;
  }
  return `
    <div class="friend-row">
      <div class="post-avatar clickable-avatar" style="width:38px;height:38px;font-size:20px;" onclick="viewUserProfile('${u.uid}')">${u.avatar}</div>
      <div class="friend-name clickable-avatar" onclick="viewUserProfile('${u.uid}')">${escapeHtml(u.name)}${nameTag(u.username, u.isPro)}</div>
      <div class="friend-actions">
        <button class="friend-btn report" onclick="blockUser('${u.uid}','${escapeHtml(u.name).replace(/'/g,"\\'")}')" title="Block">🚫</button>
        <button class="friend-btn report" onclick="reportUser('${u.uid}','${escapeHtml(u.name).replace(/'/g,"\\'")}')" title="Report">🚩</button>
        ${isFriend ? `<button class="friend-btn msg" onclick="openChat('${u.uid}')">💬</button>` : ''}
        ${actionBtn}
      </div>
    </div>
  `;
}

function filterFriendsLocal(q){
  q = q.toLowerCase();
  const filtered = cachedAllUsers.filter(u=>u.name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q));
  const rowsHtml = filtered.map(u=>friendRowHtml(u)).join('') || `<div class="empty-state"><span class="big-emoji">🔍</span>Koi match nahi mila</div>`;
  document.getElementById('friendsList').innerHTML = rowsHtml;
}

  try{

      chatId: chatKey(currentUser.uid, activeChatFriend),
      from: currentUser.uid, to: activeChatFriend, text: txt, time: Date.now(), read:false
    });
  }catch(e){ toast('Message send nahi hui, dobara try karo'); }
}

async function renderViewProfileSection(uid){
  const doc = await db.collection('users').doc(uid).get();
  if(!doc.exists){
    return `<div class="section active"><div class="empty-state"><span class="big-emoji">🤷</span>User nahi mila</div></div>`;
  }
  const u = doc.data();
  const badge = getBadge(u.coins);
  const isFriend = (currentUser.friends||[]).includes(u.uid);
  let postCount = 0;
  try{
    const psnap = await db.collection('posts').where('authorUid','==',u.uid).get();
    postCount = psnap.size;
  }catch(e){}
  let friendBtnHtml;
  if(isFriend){
    friendBtnHtml = `<button class="friend-btn added" style="flex:1;padding:12px;" onclick="removeFriend('${u.uid}')">Added ✓</button>`;
  } else {
    const [sentSnap, recvSnap] = await Promise.all([
      db.collection('friendRequests').where('fromUid','==',currentUser.uid).where('toUid','==',u.uid).where('status','==','pending').limit(1).get(),
      db.collection('friendRequests').where('fromUid','==',u.uid).where('toUid','==',currentUser.uid).where('status','==','pending').limit(1).get()
    ]);
    if(!recvSnap.empty){
      friendBtnHtml = `<button class="friend-btn add" style="flex:1;padding:12px;" onclick="acceptFriendRequest('${recvSnap.docs[0].id}','${u.uid}')">Accept ✅</button>`;
    } else if(!sentSnap.empty){
      friendBtnHtml = `<button class="friend-btn added" style="flex:1;padding:12px;" onclick="cancelFriendRequest('${u.uid}')">Requested ⏳</button>`;
    } else {
      friendBtnHtml = `<button class="friend-btn add" style="flex:1;padding:12px;" onclick="sendFriendRequest('${u.uid}')">+ Add Friend</button>`;
    }
  }
  return `
    <div class="section active">
      <div class="thread-header">
        <button class="back-btn" onclick="switchTab('${previousTab}')">←</button>
        <div class="thread-name">Profile</div>
      </div>
      <div class="profile-head">
        <div class="profile-avatar">${u.avatar}</div>
        <div class="profile-name">${escapeHtml(u.name)}${nameTag(u.username, u.isPro)}</div>
        <div class="profile-bio">${escapeHtml(u.bio||'')}</div>
        <div class="profile-badges">
          ${badge ? `<div class="badge-chip">${badge.emoji} ${badge.label}</div>` : ''}
          <div class="badge-chip">🔥 ${u.streak||1} din streak</div>
          <div class="badge-chip">🤝 ${(u.friends||[]).length} dost</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="num">${u.coins}</div><div class="lbl">Coins</div></div>
        <div class="stat-box"><div class="num">${(u.friends||[]).length}</div><div class="lbl">Friends</div></div>
        <div class="stat-box"><div class="num">${postCount}</div><div class="lbl">Posts</div></div>
      </div>
      <div class="view-profile-btns">
        ${friendBtnHtml}
        ${isFriend ? `<button class="friend-btn msg" style="flex:1;padding:12px;" onclick="openChat('${u.uid}')">💬 Message</button>` : ''}
      </div>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <button class="friend-btn report" style="flex:1;padding:10px;border:2px solid var(--line);border-radius:12px;" onclick="blockUser('${u.uid}','${escapeHtml(u.name).replace(/'/g,"\\'")}')">🚫 Block</button>
        <button class="friend-btn report" style="flex:1;padding:10px;border:2px solid var(--line);border-radius:12px;" onclick="reportUser('${u.uid}','${escapeHtml(u.name).replace(/'/g,"\\'")}')">🚩 Report</button>
      </div>
    </div>
  `;
}

function selectProfileAvatar(el, a){
  document.querySelectorAll('.avatar-picker .avatar-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  profileAvatarChoice = a;
}

async function contactForPro(){
  try{
    await db.collection('proRequests').add({
      userUid: currentUser.uid, username: currentUser.username, name: currentUser.name,
      avatar: currentUser.avatar, time: Date.now(), status:'pending'
    });
  }catch(e){ /* non-fatal, still open WhatsApp */ }
  const msg = `Salam! Main ${currentUser.name} (@${currentUser.username}) TaskYaar PRO lena chahta/chahti hoon. Payment kaise karoon?`;
  const waUrl = `https://wa.me/${OWNER_WHATSAPP}?text=${encodeURIComponent(msg)}`;
  window.open(waUrl, '_blank');
  toast('Request bhej di! WhatsApp pe baat karo, phir owner approve karega 💎');
  renderApp();
}

function getReferralLink(){
  const base = window.location.href.split('?')[0];
  return `${base}?ref=${encodeURIComponent(currentUser.username)}`;
}

function shareApp(){
  const url = getReferralLink();
  const text = `Mujhe TaskYaar pe join karo! Tasks complete karo, coins kamao, aur mujhse connect ho jao 🎯🤝 Mera referral link use karoge to dono ko bonus coins milenge!`;
  if(navigator.share){
    navigator.share({title:'TaskYaar', text, url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(`${text}\n${url}`).then(()=>{
      toast('Link copy ho gaya! 📋 Kisi ko bhi bhej do');
    }).catch(()=>{
      toast(url);
    });
  }
}

function notifPermButtonHtml(){
  if(!('Notification' in window)) return '';
  const perm = Notification.permission;
  if(perm==='granted'){
    return `<div class="badge-chip" style="display:block;text-align:center;margin-bottom:10px;padding:10px;">🔔 Push Notifications ON hain</div>`;
  }
  if(perm==='denied'){
    return `<div class="badge-chip" style="display:block;text-align:center;margin-bottom:10px;padding:10px;color:#c0392b;">🔕 Notifications block hain — browser settings se on karo</div>`;
  }
  return `<button class="btn-outline" onclick="requestNotifPermission()">🔔 Push Notifications On Karo</button>`;
}

async function saveProfile(){
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  if(!name){ toast('Naam khali nahi ho sakta'); return; }
  const patch = {name, bio};
  if(profileAvatarChoice) patch.avatar = profileAvatarChoice;
  try{
    await db.collection('users').doc(currentUser.uid).update(patch);
    Object.assign(currentUser, patch);
    await markTaskDone('t1', true);
    confettiBurst();
    toast('Profile update ho gaya! +20 coins 🎉');
    renderApp();
  }catch(e){ toast('Save nahi hua, internet check karo'); }
}

async function changePassword(){
  const input = document.getElementById('newPassword');
  const newPass = input.value;
  if(!newPass || newPass.length<6){ toast('Password kam se kam 6 characters ka ho'); return; }
  try{
    await auth.currentUser.updatePassword(newPass);
    input.value = '';
    toast('Password update ho gaya! 🔒');
  }catch(e){
    if(e.code==='auth/requires-recent-login'){
      toast('Security ke liye pehle logout karke dobara login karo, phir password change karo');
    } else {
      toast('Password update nahi hua, dobara try karo');
    }
  }
}

async function deleteMyAccount(){
  if(!confirm('Account permanently delete karna hai? Sara data (posts, coins, dost, chat) hamesha ke liye chala jayega!')) return;
  if(!confirm('Pakka pakka? Ye action wapis nahi ho sakta.')) return;
  try{
    await db.collection('users').doc(currentUser.uid).delete();
    await auth.currentUser.delete();
    toast('Account delete ho gaya. Alvida! 👋');
  }catch(e){
    if(e.code==='auth/requires-recent-login'){
      toast('Security ke liye pehle logout karke dobara login karo, phir delete karo');
    } else {
      toast('Delete nahi hua, dobara try karo');
    }
  }
}

/* ============ ADMIN PANEL (owner only) ============ */
async function renderAdminSection(){
  const isOwner = currentUser.username && currentUser.username.toLowerCase()===OWNER_USERNAME;
  if(!isOwner){
    return `<div class="section active"><div class="empty-state"><span class="big-emoji">🔒</span>Ye page sirf owner ke liye hai</div></div>`;
  }
  const [sponsoredSnap, proSnap, postsSnap, reportsSnap] = await Promise.all([
    db.collection('sponsoredTasks').get(),
    db.collection('proRequests').where('status','==','pending').get(),
    db.collection('posts').orderBy('time','desc').limit(30).get(),
    db.collection('reports').where('status','==','pending').get()
  ]);
  const sponsoredList = sponsoredSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const proList = proSnap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>a.time-b.time);
  const postsList = postsSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const reportsList = reportsSnap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>b.time-a.time);

  const sponsoredRows = sponsoredList.length ? sponsoredList.map(s=>`
    <div class="admin-row">
      <div style="font-size:20px;">${s.emoji||'⭐'}</div>
      <div class="rinfo"><b>${escapeHtml(s.title)}</b><br>${escapeHtml(s.sponsorName||'')} • 🪙${s.reward} • ${s.active?'Active':'Off'}</div>
      <button class="mini-btn toggle" onclick="toggleSponsoredActive('${s.id}', ${!s.active})">${s.active?'Off Karo':'On Karo'}</button>
      <button class="mini-btn del" onclick="deleteSponsoredTask('${s.id}')">🗑️</button>
    </div>
  `).join('') : `<div class="empty-state" style="padding:20px;"><span class="big-emoji" style="font-size:28px;">💤</span>Koi sponsored task nahi hai</div>`;

  const proRows = proList.length ? proList.map(p=>`
    <div class="admin-row">
      <div style="font-size:20px;">${p.avatar||'👤'}</div>
      <div class="rinfo"><b>${escapeHtml(p.name)}</b> (@${escapeHtml(p.username)})<br>${timeAgo(p.time)}</div>
      <button class="mini-btn approve" onclick="approveProRequest('${p.id}','${p.userUid}')">✅</button>
      <button class="mini-btn reject" onclick="rejectProRequest('${p.id}')">❌</button>
    </div>
  `).join('') : `<div class="empty-state" style="padding:20px;"><span class="big-emoji" style="font-size:28px;">✅</span>Koi pending request nahi hai</div>`;

  const postsRows = postsList.length ? postsList.map(p=>`
    <div class="admin-row">
      <div style="font-size:20px;">${p.avatar||'📝'}</div>
      <div class="rinfo"><b>${escapeHtml(p.authorName)}</b><br>${escapeHtml((p.text||'').slice(0,60))}${(p.text||'').length>60?'...':''}<br>${timeAgo(p.time)}</div>
      <button class="mini-btn del" onclick="deletePost('${p.id}')">🗑️</button>
    </div>
  `).join('') : `<div class="empty-state" style="padding:20px;"><span class="big-emoji" style="font-size:28px;">📭</span>Koi post nahi hai</div>`;

  const reportsRows = reportsList.length ? reportsList.map(r=>`
    <div class="admin-row">
      <div style="font-size:20px;">🚩</div>
      <div class="rinfo"><b>${escapeHtml(r.reportedName)}</b> ki report — by ${escapeHtml(r.reportedByName)}<br>"${escapeHtml(r.reason)}" • ${timeAgo(r.time)}</div>
      <button class="mini-btn reject" onclick="banUser('${r.id}','${r.reportedUid}')">🚫 Ban</button>
      <button class="mini-btn toggle" onclick="dismissReport('${r.id}')">Dismiss</button>
    </div>
  `).join('') : `<div class="empty-state" style="padding:20px;"><span class="big-emoji" style="font-size:28px;">✅</span>Koi report nahi hai</div>`;

  return `
    <div class="section active">
      <div class="thread-header">
        <button class="back-btn" onclick="switchTab('profile')">←</button>
        <div class="thread-name">⚙️ Admin Panel</div>
      </div>

      <div class="admin-section-title">Reports 🚩</div>
      ${reportsRows}

      <div class="admin-section-title">Naya Sponsored Task Banao</div>
      <div class="admin-form">
        <div class="field"><label>Business/Sponsor Naam</label><input id="spName" placeholder="e.g. Pizza Aish"></div>
        <div class="field"><label>Task Title</label><input id="spTitle" placeholder="e.g. Humara Instagram follow karo"></div>
        <div class="field"><label>Emoji</label><input id="spEmoji" placeholder="e.g. 📸" maxlength="4"></div>
        <div class="field"><label>Link</label><input id="spLink" placeholder="https://instagram.com/..."></div>
        <div class="field"><label>Reward (coins)</label><input id="spReward" type="number" placeholder="30"></div>
        <button class="btn-primary" onclick="addSponsoredTask()">Task Add Karo</button>
      </div>
      ${sponsoredRows}

      <div class="admin-section-title">Pending PRO Requests</div>
      ${proRows}

      <div class="admin-section-title">Posts Manage Karo</div>
      ${postsRows}
    </div>
  `;
}

async function addSponsoredTask(){
  const sponsorName = document.getElementById('spName').value.trim();
  const title = document.getElementById('spTitle').value.trim();
  const emoji = document.getElementById('spEmoji').value.trim() || '⭐';
  const link = document.getElementById('spLink').value.trim();
  const reward = parseInt(document.getElementById('spReward').value) || 10;
  if(!sponsorName || !title || !link){ toast('Sab fields fill karo'); return; }
  try{
    await db.collection('sponsoredTasks').add({sponsorName, title, emoji, link, reward, active:true, createdAt:Date.now()});
    toast('Sponsored task add ho gaya! ✅');
    renderApp();
  }catch(e){ toast('Save nahi hua, dobara try karo'); }
}

async function toggleSponsoredActive(id, newState){
  try{
    await db.collection('sponsoredTasks').doc(id).update({active:newState});
    renderApp();
  }catch(e){ toast('Update nahi hua'); }
}

async function deleteSponsoredTask(id){
  if(!confirm('Ye sponsored task delete karni hai?')) return;
  try{
    await db.collection('sponsoredTasks').doc(id).delete();
    renderApp();
  }catch(e){ toast('Delete nahi hua'); }
}

async function approveProRequest(reqId, userUid){
  try{
    const batch = db.batch();
    batch.update(db.collection('proRequests').doc(reqId), {status:'approved'});
    batch.update(db.collection('users').doc(userUid), {isPro:true, proSince:Date.now()});
    await batch.commit();
    toast('User ko PRO mil gaya! 💎');
    renderApp();
  }catch(e){ toast('Approve nahi hua, dobara try karo'); }
}

async function rejectProRequest(reqId){
  try{
    await db.collection('proRequests').doc(reqId).update({status:'rejected'});
    toast('Request reject kar di');
    renderApp();
  }catch(e){ toast('Kuch masla hua'); }
}

async function banUser(reportId, targetUid){
  if(!confirm('Is user ko ban karna hai? Wo dobara login nahi kar sakega.')) return;
  try{
    const batch = db.batch();
    batch.update(db.collection('users').doc(targetUid), {banned:true});
    batch.update(db.collection('reports').doc(reportId), {status:'resolved'});
    await batch.commit();
    toast('User ban kar diya gaya 🚫');
    renderApp();
  }catch(e){ toast('Kuch masla hua, dobara try karo'); }
}

async function dismissReport(reportId){
  try{
    await db.collection('reports').doc(reportId).update({status:'dismissed'});
    renderApp();
  }catch(e){ toast('Kuch masla hua'); }
}
