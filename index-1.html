<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskYaar - Kaam Karo, Josh Se, Reward Ke Sath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
  :root{
    --teal:#00B8A9;
    --teal-dark:#019283;
    --mango:#FFB800;
    --coral:#FF6B6B;
    --purple:#6C5CE7;
    --navy:#1B3A4B;
    --cream:#FFF9F0;
    --white:#ffffff;
    --line:#E9E2D4;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;}
  html,body{
    font-family:'Nunito',sans-serif;
    background:var(--cream);
    color:var(--navy);
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3,.brand,.tab-label,.section-title{font-family:'Baloo 2',cursive;}
  button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;}
  input,textarea,select{font-family:'Nunito',sans-serif;}
  img,svg{max-width:100%;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--cream);padding-bottom:78px;}

  /* ---------- AUTH ---------- */
  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px;background:
    radial-gradient(circle at 15% 10%, rgba(255,184,0,.28), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(108,92,231,.25), transparent 45%),
    var(--cream);
  }
  .auth-logo{text-align:center;margin-bottom:6px;}
  .auth-logo .emoji-stack{font-size:52px;line-height:1;}
  .brand{font-size:34px;font-weight:800;color:var(--navy);text-align:center;margin:6px 0 2px;letter-spacing:.5px;}
  .brand span{color:var(--teal);}
  .tagline{text-align:center;color:#6b7d84;font-weight:700;margin-bottom:28px;font-size:14.5px;}
  .card{background:var(--white);border-radius:24px;padding:24px 20px;box-shadow:0 10px 30px rgba(27,58,75,.08);border:2px solid var(--line);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-weight:800;font-size:13px;margin-bottom:6px;color:var(--navy);}
  .field input, .field select, .field textarea{
    width:100%;padding:13px 14px;border:2px solid var(--line);border-radius:14px;font-size:15px;font-weight:700;
    background:#FCFAF5;color:var(--navy);outline:none;transition:border .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--teal);}
  .avatar-picker{display:flex;flex-wrap:wrap;gap:8px;}
  .avatar-opt{font-size:26px;padding:8px 10px;border-radius:12px;border:2px solid var(--line);background:#FCFAF5;}
  .avatar-opt.selected{border-color:var(--teal);background:rgba(0,184,169,.12);}
  .btn-primary{
    width:100%;padding:14px;border-radius:16px;background:var(--teal);color:#fff;font-weight:800;font-size:16px;
    box-shadow:0 6px 0 var(--teal-dark);transition:transform .08s;
  }
  .btn-primary:active{transform:translateY(4px);box-shadow:0 2px 0 var(--teal-dark);}
  .btn-secondary{
    width:100%;padding:13px;border-radius:16px;background:transparent;color:var(--teal-dark);font-weight:800;font-size:14.5px;margin-top:10px;
  }
  .switch-line{text-align:center;margin-top:16px;font-weight:700;font-size:14px;color:#6b7d84;}
  .switch-line a{color:var(--coral);font-weight:800;text-decoration:none;}
  .error-msg{background:#FFE9E9;color:#C0392B;border:2px solid #FFC9C9;padding:9px 12px;border-radius:12px;font-weight:700;font-size:13px;margin-bottom:12px;display:none;}

  /* ---------- TOP HEADER ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 14px;background:var(--white);border-bottom:2px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  .topbar .brand-mini{font-size:20px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:6px;}
  .stat-pill{display:flex;align-items:center;gap:6px;background:#FCFAF5;border:2px solid var(--line);padding:6px 10px;border-radius:20px;font-weight:800;font-size:13.5px;}
  .stat-row{display:flex;gap:8px;}
  .coin-pill{color:#B8860B;}
  .streak-pill{color:var(--coral);}

  /* ---------- SECTIONS ---------- */
  .section{display:none;padding:16px 16px 6px;animation:fadein .25s ease;}
  .section.active{display:block;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .section-title{font-size:21px;font-weight:800;margin:4px 0 14px;}

  /* ---------- FEED ---------- */
  .composer{background:var(--white);border:2px solid var(--line);border-radius:20px;padding:14px;margin-bottom:16px;}
  .composer textarea{resize:none;min-height:60px;border:none;background:transparent;padding:4px;font-size:15px;font-weight:700;}
  .composer textarea:focus{outline:none;}
  .composer-actions{display:flex;justify-content:flex-end;margin-top:6px;}
  .btn-post{background:var(--coral);color:#fff;font-weight:800;padding:9px 20px;border-radius:14px;box-shadow:0 4px 0 #d94f4f;font-size:14px;}
  .btn-post:active{transform:translateY(3px);box-shadow:none;}
  .post-card{background:var(--white);border:2px solid var(--line);border-radius:20px;padding:14px;margin-bottom:14px;}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .post-avatar{font-size:28px;width:42px;height:42px;border-radius:50%;background:#FCFAF5;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
  .post-name{font-weight:800;font-size:14.5px;}
  .post-time{font-size:12px;color:#93a1a6;font-weight:700;}
  .post-text{font-size:15px;font-weight:700;line-height:1.5;margin:6px 0 10px;color:var(--navy);}
  .post-actions{display:flex;gap:16px;border-top:2px solid var(--line);padding-top:10px;}
  .post-actions button{background:none;color:#6b7d84;font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:5px;}
  .post-actions button.liked{color:var(--coral);}
  .comment-box{margin-top:10px;display:none;}
  .comment-box.open{display:block;}
  .comment-item{font-size:13.5px;font-weight:700;background:#FCFAF5;padding:7px 10px;border-radius:10px;margin-top:6px;}
  .comment-item b{color:var(--teal-dark);}
  .comment-input-row{display:flex;gap:8px;margin-top:8px;}
  .comment-input-row input{flex:1;padding:9px 12px;border-radius:12px;border:2px solid var(--line);font-size:13.5px;font-weight:700;}
  .comment-input-row button{background:var(--teal);color:#fff;padding:0 14px;border-radius:12px;font-weight:800;font-size:13px;}
  .empty-state{text-align:center;padding:40px 20px;color:#93a1a6;font-weight:700;}
  .empty-state .big-emoji{font-size:44px;display:block;margin-bottom:10px;}

  /* ---------- TASKS ---------- */
  .streak-banner{background:linear-gradient(135deg,var(--mango),#ffcf4d);border-radius:20px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;color:#5c3d00;}
  .streak-banner .big{font-size:26px;font-weight:800;}
  .task-card{background:var(--white);border:2px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
  .task-card.done{opacity:.55;}
  .task-emoji{font-size:26px;width:46px;height:46px;background:#FCFAF5;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .task-body{flex:1;}
  .task-title{font-weight:800;font-size:14.5px;}
  .task-reward{font-size:12.5px;font-weight:800;color:#B8860B;margin-top:2px;}
  .task-btn{background:var(--purple);color:#fff;font-weight:800;font-size:12.5px;padding:9px 14px;border-radius:12px;box-shadow:0 4px 0 #5647c2;white-space:nowrap;}
  .task-btn:active{transform:translateY(3px);box-shadow:none;}
  .task-btn.done-btn{background:#B7EFC5;color:#1c7a3a;box-shadow:none;}

  /* ---------- LEADERBOARD ---------- */
  .lb-row{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px;}
  .lb-rank{font-weight:800;font-size:16px;width:26px;text-align:center;color:#93a1a6;}
  .lb-rank.top1{color:#FFB800;font-size:20px;}
  .lb-rank.top2{color:#B0B0B0;font-size:18px;}
  .lb-rank.top3{color:#CD7F32;font-size:18px;}
  .lb-avatar{font-size:24px;width:38px;height:38px;background:#FCFAF5;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
  .lb-name{font-weight:800;font-size:14px;flex:1;}
  .lb-coins{font-weight:800;color:#B8860B;font-size:13.5px;}
  .lb-you{border-color:var(--teal);background:rgba(0,184,169,.06);}

  /* ---------- PROFILE ---------- */
  .profile-head{text-align:center;padding:10px 0 18px;}
  .profile-avatar{font-size:56px;width:96px;height:96px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:3px solid var(--teal);}
  .profile-name{font-size:20px;font-weight:800;}
  .profile-bio{font-size:13.5px;color:#6b7d84;font-weight:700;margin-top:4px;padding:0 20px;}
  .profile-badges{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .badge-chip{background:var(--white);border:2px solid var(--line);border-radius:12px;padding:5px 10px;font-size:12px;font-weight:800;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
  .stat-box{background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 6px;text-align:center;}
  .stat-box .num{font-size:18px;font-weight:800;color:var(--teal-dark);}
  .stat-box .lbl{font-size:11px;font-weight:700;color:#93a1a6;}
  .profile-section-label{font-weight:800;font-size:14px;margin:16px 0 8px;color:var(--navy);}
  .btn-outline{width:100%;padding:12px;border-radius:14px;border:2px solid var(--line);background:var(--white);font-weight:800;color:var(--navy);margin-bottom:10px;}
  .btn-danger{width:100%;padding:12px;border-radius:14px;background:transparent;color:var(--coral);font-weight:800;border:2px solid #FFD3D3;}

  /* ---------- FRIENDS ---------- */
  .friend-row{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:11px 14px;margin-bottom:10px;}
  .friend-name{font-weight:800;font-size:14px;flex:1;}
  .friend-btn{font-weight:800;font-size:12.5px;padding:8px 13px;border-radius:12px;}
  .friend-btn.add{background:var(--teal);color:#fff;}
  .friend-btn.added{background:#EAEAEA;color:#93a1a6;}
  .friend-btn.msg{background:var(--purple);color:#fff;margin-left:6px;}
  .friend-actions{display:flex;align-items:center;}
  .search-bar{width:100%;padding:12px 14px;border-radius:14px;border:2px solid var(--line);font-weight:700;margin-bottom:14px;font-size:14px;background:var(--white);}

  /* ---------- CHAT ---------- */
  .chat-list-row{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px;position:relative;}
  .chat-list-row .post-avatar{width:44px;height:44px;font-size:22px;flex-shrink:0;}
  .chat-info{flex:1;min-width:0;}
  .chat-name-row{display:flex;justify-content:space-between;align-items:center;}
  .chat-name{font-weight:800;font-size:14.5px;}
  .chat-time{font-size:11px;color:#93a1a6;font-weight:700;}
  .chat-preview{font-size:12.5px;color:#8a969a;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;}
  .unread-dot{background:var(--coral);color:#fff;font-size:10.5px;font-weight:800;min-width:19px;height:19px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;}
  .nav-icon-wrap{position:relative;display:inline-block;}
  .nav-badge{position:absolute;top:-4px;right:-8px;background:var(--coral);color:#fff;font-size:9px;font-weight:800;min-width:14px;height:14px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

  /* thread view */
  .thread-header{display:flex;align-items:center;gap:10px;padding:2px 0 14px;border-bottom:2px solid var(--line);margin-bottom:12px;}
  .back-btn{background:var(--white);border:2px solid var(--line);width:36px;height:36px;border-radius:12px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .thread-avatar{font-size:24px;width:38px;height:38px;background:#FCFAF5;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);}
  .thread-name{font-weight:800;font-size:15px;}
  .thread-messages{display:flex;flex-direction:column;gap:8px;padding-bottom:12px;}
  .msg-bubble{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14px;font-weight:700;line-height:1.4;word-wrap:break-word;}
  .msg-mine{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:4px;}
  .msg-theirs{align-self:flex-start;background:var(--white);border:2px solid var(--line);color:var(--navy);border-bottom-left-radius:4px;}
  .msg-time{font-size:9.5px;font-weight:700;opacity:.65;margin-top:3px;display:block;}
  .chat-input-bar{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--white);border-top:2px solid var(--line);padding:10px 14px;display:flex;gap:8px;z-index:25;}
  .chat-input-bar input{flex:1;padding:11px 14px;border-radius:20px;border:2px solid var(--line);font-weight:700;font-size:14px;}
  .chat-send-btn{background:var(--coral);color:#fff;width:42px;height:42px;border-radius:50%;font-size:16px;flex-shrink:0;}
  .thread-body{padding-bottom:60px;}

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--white);border-top:2px solid var(--line);display:flex;z-index:30;
    padding:7px 2px calc(7px + env(safe-area-inset-bottom));
  }
  .nav-btn{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#B7C2C6;padding:5px 0;border-radius:12px;min-width:0;}
  .nav-btn .nav-icon{font-size:19px;}
  .nav-btn .tab-label{font-size:9.5px;font-weight:700;}
  .nav-btn.active{color:var(--teal-dark);}
  .nav-btn.active .tab-label{font-weight:800;}

  /* ---------- TOAST / CONFETTI ---------- */
  .toast{
    position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#fff;padding:12px 20px;border-radius:16px;font-weight:800;font-size:14px;
    opacity:0;transition:all .3s;z-index:100;max-width:90%;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .confetti-piece{position:fixed;top:-10px;font-size:18px;z-index:99;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0.2;}}

  ::-webkit-scrollbar{width:0;}
</style>
<body>
<div id="app"></div>
<script>
/* ====================================================================
   TASKYAAR — FIREBASE CONFIG
   Neeche apna Firebase project ka config paste karo (Firebase Console
   > Project Settings > General > Your apps > SDK setup and config).
   ==================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyBf-Pqipw_m8TfFmwSXOqEM9nmesVs4QcM",
  authDomain: "taskyaar-a925b.firebaseapp.com",
  projectId: "taskyaar-a925b",
  storageBucket: "taskyaar-a925b.firebasestorage.app",
  messagingSenderId: "396863993634",
  appId: "1:396863993634:web:fc94bc43fae8ff9de1977b"
};

const app = document.getElementById('app');

if(firebaseConfig.apiKey === "YOUR_API_KEY_HERE"){
  app.innerHTML = `
    <div style="padding:50px 26px;text-align:center;font-family:sans-serif;max-width:480px;margin:0 auto;">
      <div style="font-size:44px;">⚙️</div>
      <h2 style="color:#1B3A4B;">Firebase Config Missing</h2>
      <p style="color:#6b7d84;line-height:1.6;font-weight:600;">
        Is file ke <code>bodyscript</code> (script tag) ke top mein apna Firebase project ka
        <b>firebaseConfig</b> object paste karo, phir site kaam karegi.
        Setup guide chat mein di gayi hai.
      </p>
    </div>`;
  throw new Error('Firebase config not set');
}

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FieldValue = firebase.firestore.FieldValue;

/* ============ CONSTANTS ============ */
const AVATARS = ['😎','🦁','🐼','🦊','🐸','🐨','🦄','🐯','🐵','🦉','🐺','🐧','🥷','🧑‍🚀','🧑‍💻','🧙'];
const TASKS = [
  {id:'t1', title:'Apna profile complete karo', desc:'Bio aur avatar set karo', emoji:'📝', reward:20},
  {id:'t2', title:'Ek post share karo', desc:'Feed pe kuch likho', emoji:'📢', reward:15},
  {id:'t3', title:'3 posts ko like karo', desc:'Doston ki post pasand karo', emoji:'❤️', reward:10},
  {id:'t4', title:'Naya dost banao', desc:'Kisi ko follow/add karo', emoji:'🤝', reward:25},
  {id:'t5', title:'Kisi post pe comment karo', desc:'Apna khayal share karo', emoji:'💬', reward:10},
  {id:'t6', title:'Aaj app explore karo', desc:'Sab tabs ghoom kar aao', emoji:'🧭', reward:5},
];

function todayStr(){ return new Date().toISOString().slice(0,10); }
function usernameToEmail(u){ return u.toLowerCase()+'@taskyaar.local'; }
function chatKey(u1,u2){ return [u1,u2].sort().join('_'); }
function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML; }
function timeAgo(ts){
  const mins = Math.floor((Date.now()-ts)/60000);
  if(mins<1) return 'abhi';
  if(mins<60) return mins+'m pehle';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h pehle';
  return Math.floor(hrs/24)+'d pehle';
}
function getBadge(coins){
  if(coins>=2500) return {emoji:'💎', label:'Diamond'};
  if(coins>=1000) return {emoji:'🥇', label:'Gold'};
  if(coins>=500) return {emoji:'🥈', label:'Silver'};
  if(coins>=100) return {emoji:'🥉', label:'Bronze'};
  return null;
}
function firebaseErrorMsg(e){
  const code = e && e.code;
  if(code==='auth/email-already-in-use') return 'Ye username pehle se registered hai';
  if(code==='auth/weak-password') return 'Password kam se kam 6 characters ka ho';
  if(code==='auth/invalid-email') return 'Username mein sirf letters/numbers use karo';
  if(code==='auth/user-not-found' || code==='auth/wrong-password' || code==='auth/invalid-credential') return 'Username ya password ghalat hai';
  if(code==='auth/network-request-failed') return 'Internet connection check karo';
  return 'Kuch masla hua, dobara try karo';
}

function toast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2200);
}
function confettiBurst(){
  const emojis = ['🎉','⭐','🪙','✨','🎊'];
  for(let i=0;i<18;i++){
    const el = document.createElement('div');
    el.className='confetti-piece';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'vw';
    el.style.animationDuration = (1.6+Math.random()*1.2)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
}

/* ============ APP STATE ============ */
let currentUser = null;      // cached Firestore user doc, includes uid
let currentTab = 'feed';
let openComments = {};
let activeChatFriend = null; // friend uid
let cachedPosts = [];
let cachedAllUsers = [];
let chatMessagesCache = [];
let unreadTotal = 0;
let unsubscribeChat = null;
let unsubscribeUnread = null;
let authMode = 'login';
let selectedAvatar = AVATARS[0];
let profileAvatarChoice = null;
let authLoading = false;

/* ============ AUTH SCREENS ============ */
function renderAuth(){
  app.innerHTML = `
  <div class="auth-wrap">
    <div class="auth-logo"><span class="emoji-stack">🎯🤝</span></div>
    <div class="brand">Task<span>Yaar</span></div>
    <div class="tagline">Kaam Karo • Josh Se • Reward Ke Sath</div>
    <div class="card">
      <div class="error-msg" id="errMsg"></div>
      ${authMode==='login' ? renderLoginForm() : renderSignupForm()}
    </div>
    <div class="switch-line">
      ${authMode==='login'
        ? `Naya user ho? <a onclick="switchAuthMode('signup')">Account banao</a>`
        : `Pehle se account hai? <a onclick="switchAuthMode('login')">Login karo</a>`}
    </div>
  </div>`;
}

function renderLoginForm(){
  return `
    <div class="field">
      <label>Username</label>
      <input id="loginUser" placeholder="apna username likho" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="password">
    </div>
    <button class="btn-primary" id="authBtn" onclick="doLogin()">Login Karo 🚀</button>
  `;
}

function renderSignupForm(){
  const avatarOptions = AVATARS.map((a,i)=>`<div class="avatar-opt ${i===0?'selected':''}" onclick="selectAvatar(this,'${a}')">${a}</div>`).join('');
  return `
    <div class="field">
      <label>Poora Naam</label>
      <input id="suName" placeholder="Apna naam likho">
    </div>
    <div class="field">
      <label>Username</label>
      <input id="suUser" placeholder="unique username" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="suPass" type="password" placeholder="kam se kam 6 characters">
    </div>
    <div class="field">
      <label>Avatar Choose Karo</label>
      <div class="avatar-picker">${avatarOptions}</div>
    </div>
    <button class="btn-primary" id="authBtn" onclick="doSignup()">Sign Up Karo ✨</button>
  `;
}

function selectAvatar(el, a){
  document.querySelectorAll('.auth-wrap .avatar-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  selectedAvatar = a;
}

function switchAuthMode(mode){
  authMode = mode;
  selectedAvatar = AVATARS[0];
  renderAuth();
}

function showAuthError(msg){
  const e = document.getElementById('errMsg');
  if(!e) return;
  e.textContent = msg;
  e.style.display = 'block';
}

function setAuthLoading(loading, label){
  const btn = document.getElementById('authBtn');
  if(!btn) return;
  authLoading = loading;
  btn.disabled = loading;
  btn.style.opacity = loading ? '0.6' : '1';
  if(loading) btn.textContent = label;
}

async function doLogin(){
  if(authLoading) return;
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  if(!u || !p){ showAuthError('Username aur password dono likho'); return; }
  showAuthError('');
  setAuthLoading(true, 'Login ho raha hai...');
  try{
    await auth.signInWithEmailAndPassword(usernameToEmail(u), p);
    // onAuthStateChanged will take over from here
  }catch(e){
    showAuthError(firebaseErrorMsg(e));
    setAuthLoading(false, 'Login Karo 🚀');
  }
}

async function doSignup(){
  if(authLoading) return;
  const name = document.getElementById('suName').value.trim();
  let uname = document.getElementById('suUser').value.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_.-]/g,'');
  const pass = document.getElementById('suPass').value;
  if(!name || !uname || !pass){ showAuthError('Sab fields sahi se fill karo'); return; }
  if(pass.length<6){ showAuthError('Password kam se kam 6 characters ka ho'); return; }
  showAuthError('');
  setAuthLoading(true, 'Account ban raha hai...');
  try{
    const dupSnap = await db.collection('users').where('username','==',uname).limit(1).get();
    if(!dupSnap.empty){ showAuthError('Ye username pehle se maujood hai'); setAuthLoading(false,'Sign Up Karo ✨'); return; }
    const cred = await auth.createUserWithEmailAndPassword(usernameToEmail(uname), pass);
    const uid = cred.user.uid;
    await db.collection('users').doc(uid).set({
      uid, username:uname, name, avatar:selectedAvatar, bio:'Naya TaskYaar member!',
      coins:0, streak:1, lastLogin:todayStr(), friends:[], tasksDone:{}, createdAt:Date.now()
    });
    // onAuthStateChanged will take over and render app
  }catch(e){
    showAuthError(firebaseErrorMsg(e));
    setAuthLoading(false, 'Sign Up Karo ✨');
  }
}

function doLogout(){
  if(unsubscribeChat) unsubscribeChat();
  if(unsubscribeUnread) unsubscribeUnread();
  currentUser = null;
  auth.signOut();
}

/* ============ AUTH STATE / STREAK ============ */
auth.onAuthStateChanged(async fbUser=>{
  if(fbUser){
    try{
      const doc = await db.collection('users').doc(fbUser.uid).get();
      if(!doc.exists){ renderAuth(); return; }
      currentUser = doc.data();
      await handleStreak();
      attachGlobalUnreadListener();
      currentTab = 'feed';
      renderApp();
    }catch(e){
      renderAuth();
    }
  } else {
    currentUser = null;
    renderAuth();
  }
});

async function handleStreak(){
  const today = todayStr();
  if(currentUser.lastLogin === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const newStreak = (currentUser.lastLogin === yesterday) ? (currentUser.streak||0)+1 : 1;
  try{
    await db.collection('users').doc(currentUser.uid).update({streak:newStreak, lastLogin:today});
    currentUser.streak = newStreak;
    currentUser.lastLogin = today;
  }catch(e){ /* non-fatal */ }
}

async function refreshCurrentUser(){
  const doc = await db.collection('users').doc(currentUser.uid).get();
  currentUser = doc.data();
}

/* ============ MAIN APP SHELL ============ */
async function renderApp(){
  if(!currentUser){ renderAuth(); return; }
  app.innerHTML = `
    <div class="topbar">
      <div class="brand-mini">🎯 Task<span style="color:var(--teal)">Yaar</span></div>
      <div class="stat-row">
        <div class="stat-pill coin-pill">🪙 ${currentUser.coins}</div>
        <div class="stat-pill streak-pill">🔥 ${currentUser.streak||1}</div>
      </div>
    </div>
    <div id="sectionHost">${loadingHtml()}</div>
    <div class="bottom-nav">
      ${navBtn('feed','🏠','Home')}
      ${navBtn('tasks','✅','Tasks')}
      ${navBtn('chat','💬','Chat')}
      ${navBtn('leaderboard','🏆','Rank')}
      ${navBtn('friends','🤝','Network')}
      ${navBtn('profile','👤','Profile')}
    </div>
  `;
  updateNavBadgeDisplay();
  await renderSection();
}

function loadingHtml(){
  return `<div class="empty-state"><span class="big-emoji">⏳</span>Load ho raha hai...</div>`;
}

function navBtn(tab, icon, label){
  const wrapId = tab==='chat' ? ' id="chatNavIconWrap"' : '';
  return `<button class="nav-btn ${currentTab===tab?'active':''}" onclick="switchTab('${tab}')">
    <span class="nav-icon-wrap"${wrapId}><span class="nav-icon">${icon}</span></span><span class="tab-label">${label}</span>
  </button>`;
}

function updateNavBadgeDisplay(){
  const wrap = document.getElementById('chatNavIconWrap');
  if(!wrap) return;
  const existing = wrap.querySelector('.nav-badge');
  if(unreadTotal>0){
    const text = unreadTotal>9?'9+':unreadTotal;
    if(existing) existing.textContent = text;
    else wrap.insertAdjacentHTML('beforeend', `<span class="nav-badge">${text}</span>`);
  } else if(existing){ existing.remove(); }
}

async function switchTab(tab){
  currentTab = tab;
  if(tab!=='chat'){ activeChatFriend=null; if(unsubscribeChat){ unsubscribeChat(); unsubscribeChat=null; } }
  await renderApp();
}

async function renderSection(){
  const host = document.getElementById('sectionHost');
  try{
    if(currentTab==='feed') host.innerHTML = await renderFeedSection();
    else if(currentTab==='tasks') host.innerHTML = renderTasksSection();
    else if(currentTab==='chat') host.innerHTML = activeChatFriend ? await renderChatThreadInit(activeChatFriend) : await renderChatList();
    else if(currentTab==='leaderboard') host.innerHTML = await renderLeaderboardSection();
    else if(currentTab==='friends') host.innerHTML = await renderFriendsSection();
    else if(currentTab==='profile') host.innerHTML = await renderProfileSection();
    if(currentTab==='chat' && activeChatFriend) attachChatListener(activeChatFriend);
  }catch(e){
    host.innerHTML = `<div class="empty-state"><span class="big-emoji">⚠️</span>Load nahi ho saka, internet check karo</div>`;
  }
}

/* ============ FEED ============ */
async function renderFeedSection(){
  const snap = await db.collection('posts').orderBy('time','desc').limit(50).get();
  cachedPosts = snap.docs.map(d=>({id:d.id, ...d.data()}));
  return buildFeedHtml(cachedPosts);
}

function buildFeedHtml(posts){
  const postsHtml = posts.length ? posts.map(p=>renderPostCard(p)).join('') : `
    <div class="empty-state"><span class="big-emoji">📭</span>Abhi koi post nahi hai<br>Sabse pehle tum likho!</div>`;
  return `
    <div class="section active">
      <div class="composer">
        <textarea id="postText" placeholder="Aaj ka josh kya hai? Kuch share karo..."></textarea>
        <div class="composer-actions"><button class="btn-post" onclick="submitPost()">Post Karo</button></div>
      </div>
      ${postsHtml}
    </div>
  `;
}

function renderPostCard(p){
  const liked = (p.likes||[]).includes(currentUser.uid);
  const isOpen = openComments[p.id];
  const comments = p.comments||[];
  return `
    <div class="post-card">
      <div class="post-head">
        <div class="post-avatar">${p.avatar}</div>
        <div>
          <div class="post-name">${escapeHtml(p.authorName)}</div>
          <div class="post-time">${timeAgo(p.time)}</div>
        </div>
      </div>
      <div class="post-text">${escapeHtml(p.text)}</div>
      <div class="post-actions">
        <button class="${liked?'liked':''}" onclick="toggleLike('${p.id}')">${liked?'❤️':'🤍'} ${(p.likes||[]).length}</button>
        <button onclick="toggleComments('${p.id}')">💬 ${comments.length}</button>
      </div>
      <div class="comment-box ${isOpen?'open':''}" id="cbox-${p.id}">
        ${comments.map(c=>`<div class="comment-item"><b>${escapeHtml(c.authorName)}:</b> ${escapeHtml(c.text)}</div>`).join('')}
        <div class="comment-input-row">
          <input id="cinput-${p.id}" placeholder="Comment likho...">
          <button onclick="submitComment('${p.id}')">Send</button>
        </div>
      </div>
    </div>
  `;
}

async function submitPost(){
  const el = document.getElementById('postText');
  const txt = el.value.trim();
  if(!txt) return;
  el.disabled = true;
  try{
    await db.collection('posts').add({authorUid:currentUser.uid, authorName:currentUser.name, avatar:currentUser.avatar, text:txt, time:Date.now(), likes:[], comments:[]});
    await markTaskDone('t2', true);
    toast('Post ho gayi! 📢');
    renderApp();
  }catch(e){ toast('Post save nahi hui, dobara try karo'); el.disabled=false; }
}

async function toggleLike(postId){
  const post = cachedPosts.find(p=>p.id===postId);
  if(!post) return;
  const liked = (post.likes||[]).includes(currentUser.uid);
  try{
    await db.collection('posts').doc(postId).update({
      likes: liked ? FieldValue.arrayRemove(currentUser.uid) : FieldValue.arrayUnion(currentUser.uid)
    });
    if(!liked) await checkLikeTaskDB();
    renderApp();
  }catch(e){ toast('Like save nahi hui'); }
}

async function checkLikeTaskDB(){
  const snap = await db.collection('posts').where('likes','array-contains',currentUser.uid).get();
  if(snap.size>=3) await markTaskDone('t3', true);
}

function toggleComments(pid){
  openComments[pid] = !openComments[pid];
  document.getElementById('sectionHost').innerHTML = buildFeedHtml(cachedPosts);
}

async function submitComment(pid){
  const input = document.getElementById('cinput-'+pid);
  const txt = input.value.trim();
  if(!txt) return;
  try{
    await db.collection('posts').doc(pid).update({
      comments: FieldValue.arrayUnion({authorName:currentUser.name, text:txt, time:Date.now()})
    });
    await markTaskDone('t5', true);
    openComments[pid] = true;
    renderApp();
  }catch(e){ toast('Comment save nahi hui'); }
}

/* ============ TASKS ============ */
function isTaskDoneToday(taskId){
  const list = (currentUser.tasksDone && currentUser.tasksDone[todayStr()]) || [];
  return list.includes(taskId);
}

async function markTaskDone(taskId, silent){
  if(!currentUser || isTaskDoneToday(taskId)) return;
  const task = TASKS.find(t=>t.id===taskId);
  const today = todayStr();
  try{
    await db.collection('users').doc(currentUser.uid).update({
      [`tasksDone.${today}`]: FieldValue.arrayUnion(taskId),
      coins: FieldValue.increment(task.reward)
    });
    await refreshCurrentUser();
    if(!silent){ confettiBurst(); toast(`+${task.reward} coins! ${task.title} complete ✅`); }
    if(!silent) renderApp();
  }catch(e){ /* non-fatal */ }
}

function renderTasksSection(){
  const doneToday = (currentUser.tasksDone && currentUser.tasksDone[todayStr()]) || [];
  const tasksHtml = TASKS.map(t=>{
    const done = doneToday.includes(t.id);
    return `
      <div class="task-card ${done?'done':''}">
        <div class="task-emoji">${t.emoji}</div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-reward">🪙 +${t.reward} coins</div>
        </div>
        ${done
          ? `<div class="task-btn done-btn">Ho gaya ✅</div>`
          : (t.id==='t1' || t.id==='t4' || t.id==='t6'
              ? `<button class="task-btn" onclick="quickCompleteTask('${t.id}')">Claim</button>`
              : `<div class="task-btn" style="background:#EAEAEA;color:#93a1a6;box-shadow:none;">Auto</div>`)
        }
      </div>
    `;
  }).join('');
  return `
    <div class="section active">
      <div class="streak-banner">
        <div><div style="font-weight:800;font-size:13px;">Tumhari Streak</div><div class="big">🔥 ${currentUser.streak||1} din</div></div>
        <div style="font-size:34px;">🔥</div>
      </div>
      <div class="section-title">Aaj Ke Tasks</div>
      ${tasksHtml}
    </div>
  `;
}

async function quickCompleteTask(taskId){
  if(taskId==='t1'){ switchTab('profile'); toast('Profile section mein bio/avatar update karo'); return; }
  if(taskId==='t4'){ switchTab('friends'); toast('Kisi ko add karke ye task complete hoga'); return; }
  await markTaskDone(taskId, false);
}

/* ============ FRIENDS / NETWORK ============ */
async function renderFriendsSection(){
  const snap = await db.collection('users').get();
  cachedAllUsers = snap.docs.map(d=>d.data()).filter(u=>u.uid!==currentUser.uid);
  return buildFriendsHtml(cachedAllUsers);
}

function buildFriendsHtml(list){
  const rowsHtml = list.map(u=>friendRowHtml(u)).join('') || `<div class="empty-state"><span class="big-emoji">🌱</span>Abhi koi aur user nahi hai</div>`;
  return `
    <div class="section active">
      <div class="section-title">Network Banao 🤝</div>
      <input class="search-bar" placeholder="Users dhoondo..." oninput="filterFriendsLocal(this.value)">
      <div id="friendsList">${rowsHtml}</div>
    </div>
  `;
}

function friendRowHtml(u){
  const isFriend = (currentUser.friends||[]).includes(u.uid);
  return `
    <div class="friend-row">
      <div class="post-avatar" style="width:38px;height:38px;font-size:20px;">${u.avatar}</div>
      <div class="friend-name">${escapeHtml(u.name)}</div>
      <div class="friend-actions">
        ${isFriend ? `<button class="friend-btn msg" onclick="openChat('${u.uid}')">💬</button>` : ''}
        <button class="friend-btn ${isFriend?'added':'add'}" onclick="toggleFriend('${u.uid}')">${isFriend?'Added ✓':'+ Add'}</button>
      </div>
    </div>
  `;
}

function filterFriendsLocal(q){
  q = q.toLowerCase();
  const filtered = cachedAllUsers.filter(u=>u.name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q));
  const rowsHtml = filtered.map(u=>friendRowHtml(u)).join('') || `<div class="empty-state"><span class="big-emoji">🔍</span>Koi match nahi mila</div>`;
  document.getElementById('friendsList').innerHTML = rowsHtml;
}

async function toggleFriend(uid){
  const isFriend = (currentUser.friends||[]).includes(uid);
  const myRef = db.collection('users').doc(currentUser.uid);
  const theirRef = db.collection('users').doc(uid);
  const batch = db.batch();
  if(isFriend){
    batch.update(myRef, {friends: FieldValue.arrayRemove(uid)});
    batch.update(theirRef, {friends: FieldValue.arrayRemove(currentUser.uid)});
  } else {
    batch.update(myRef, {friends: FieldValue.arrayUnion(uid)});
    batch.update(theirRef, {friends: FieldValue.arrayUnion(currentUser.uid)});
  }
  try{
    await batch.commit();
    await refreshCurrentUser();
    if(!isFriend){
      await markTaskDone('t4', true);
      confettiBurst();
      toast('Naya dost add hua! +25 coins 🎉');
    }
    renderApp();
  }catch(e){ toast('Kuch masla hua, dobara try karo'); }
}

/* ============ CHAT (REAL-TIME) ============ */
function attachGlobalUnreadListener(){
  if(unsubscribeUnread) unsubscribeUnread();
  unsubscribeUnread = db.collection('messages').where('to','==',currentUser.uid)
    .onSnapshot(snap=>{
      unreadTotal = snap.docs.filter(d=>!d.data().read).length;
      updateNavBadgeDisplay();
    }, e=>{ /* non-fatal */ });
}

async function getLastMessageAndUnread(friendUid){
  const key = chatKey(currentUser.uid, friendUid);
  const snap = await db.collection('messages').where('chatId','==',key).get();
  const msgs = snap.docs.map(d=>d.data()).sort((a,b)=>a.time-b.time);
  const last = msgs[msgs.length-1] || null;
  const unread = msgs.filter(m=>m.to===currentUser.uid && !m.read).length;
  return {last, unread};
}

async function renderChatList(){
  const friendUids = currentUser.friends||[];
  if(friendUids.length===0){
    return `
      <div class="section active">
        <div class="section-title">Chats 💬</div>
        <div class="empty-state"><span class="big-emoji">🤝</span>Pehle Network tab se dost banao,<br>phir unse chat kar sakoge!</div>
      </div>
    `;
  }
  const friendDocs = await Promise.all(friendUids.map(uid=>db.collection('users').doc(uid).get()));
  const friends = friendDocs.filter(d=>d.exists).map(d=>d.data());
  const extras = await Promise.all(friends.map(f=>getLastMessageAndUnread(f.uid)));
  const rows = friends.map((f,i)=>{
    const {last, unread} = extras[i];
    return `
      <div class="chat-list-row" onclick="openChat('${f.uid}')">
        <div class="post-avatar">${f.avatar}</div>
        <div class="chat-info">
          <div class="chat-name-row">
            <span class="chat-name">${escapeHtml(f.name)}</span>
            ${last ? `<span class="chat-time">${timeAgo(last.time)}</span>` : ''}
          </div>
          <div class="chat-preview">${last ? (last.from===currentUser.uid?'Tum: ':'') + escapeHtml(last.text) : 'Chat shuru karo 👋'}</div>
        </div>
        ${unread>0 ? `<div class="unread-dot">${unread}</div>` : ''}
      </div>
    `;
  }).join('');
  return `<div class="section active"><div class="section-title">Chats 💬</div>${rows}</div>`;
}

function openChat(friendUid){
  activeChatFriend = friendUid;
  currentTab = 'chat';
  renderApp();
}

function backToChatList(){
  activeChatFriend = null;
  if(unsubscribeChat){ unsubscribeChat(); unsubscribeChat=null; }
  renderApp();
}

async function renderChatThreadInit(friendUid){
  const doc = await db.collection('users').doc(friendUid).get();
  if(!doc.exists){ activeChatFriend=null; return await renderChatList(); }
  const friend = doc.data();
  return `
    <div class="section active thread-body">
      <div class="thread-header">
        <button class="back-btn" onclick="backToChatList()">←</button>
        <div class="thread-avatar">${friend.avatar}</div>
        <div class="thread-name">${escapeHtml(friend.name)}</div>
      </div>
      <div class="thread-messages" id="threadMsgs">${loadingHtml()}</div>
    </div>
    <div class="chat-input-bar">
      <input id="chatInput" placeholder="Message likho..." onkeydown="if(event.key==='Enter') sendChatMessage()">
      <button class="chat-send-btn" onclick="sendChatMessage()">➤</button>
    </div>
  `;
}

function attachChatListener(friendUid){
  if(unsubscribeChat) unsubscribeChat();
  const key = chatKey(currentUser.uid, friendUid);
  unsubscribeChat = db.collection('messages').where('chatId','==',key)
    .onSnapshot(snap=>{
      chatMessagesCache = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>a.time-b.time);
      renderThreadMessages();
      markMessagesRead(friendUid);
    }, e=>{ /* non-fatal */ });
}

function renderThreadMessages(){
  const box = document.getElementById('threadMsgs');
  if(!box) return;
  box.innerHTML = chatMessagesCache.length ? chatMessagesCache.map(m=>`
    <div class="msg-bubble ${m.from===currentUser.uid?'msg-mine':'msg-theirs'}">
      ${escapeHtml(m.text)}
      <span class="msg-time">${new Date(m.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span>
    </div>
  `).join('') : `<div class="empty-state"><span class="big-emoji">👋</span>Salam bolo, baat shuru karo!</div>`;
  box.scrollTop = box.scrollHeight;
}

async function markMessagesRead(friendUid){
  const unreadMsgs = chatMessagesCache.filter(m=>m.to===currentUser.uid && m.from===friendUid && !m.read);
  if(unreadMsgs.length===0) return;
  try{
    const batch = db.batch();
    unreadMsgs.forEach(m=> batch.update(db.collection('messages').doc(m.id), {read:true}));
    await batch.commit();
  }catch(e){ /* non-fatal */ }
}

async function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const txt = input.value.trim();
  if(!txt || !activeChatFriend) return;
  input.value = '';
  try{
    await db.collection('messages').add({
      chatId: chatKey(currentUser.uid, activeChatFriend),
      from: currentUser.uid, to: activeChatFriend, text: txt, time: Date.now(), read:false
    });
  }catch(e){ toast('Message send nahi hui, dobara try karo'); }
}

    const snap = await db.collection('posts').where('authorUid','==',currentUser.uid).get();

      <div class="profile-head">
        <div class="profile-avatar">${currentUser.avatar}</div>
        <div class="profile-name">${escapeHtml(currentUser.name)}</div>
        <div class="profile-bio">${escapeHtml(currentUser.bio||'')}</div>
        <div class="profile-badges">
          ${badge ? `<div class="badge-chip">${badge.emoji} ${badge.label}</div>` : ''}
          <div class="badge-chip">🔥 ${currentUser.streak||1} din streak</div>
          <div class="badge-chip">🤝 ${(currentUser.friends||[]).length} dost</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="num">${currentUser.coins}</div><div class="lbl">Coins</div></div>
        <div class="stat-box"><div class="num">${(currentUser.friends||[]).length}</div><div class="lbl">Friends</div></div>
        <div class="stat-box"><div class="num">${postCount}</div><div class="lbl">Posts</div></div>
      </div>
      <div class="profile-section-label">Profile Edit Karo</div>
      <div class="field">
        <label>Naam</label>
        <input id="editName" value="${escapeHtml(currentUser.name)}">
      </div>
      <div class="field">
        <label>Bio</label>
        <textarea id="editBio" style="min-height:50px;">${escapeHtml(currentUser.bio||'')}</textarea>
      </div>
      <div class="field">
        <label>Avatar</label>
        <div class="avatar-picker">
          ${AVATARS.map(a=>`<div class="avatar-opt ${a===currentUser.avatar?'selected':''}" onclick="selectProfileAvatar(this,'${a}')">${a}</div>`).join('')}
        </div>
      </div>
      <button class="btn-primary" onclick="saveProfile()">Profile Save Karo</button>
      <div style="height:10px;"></div>
      <button class="btn-danger" onclick="doLogout()">Logout</button>
    </div>
  `;
}

function selectProfileAvatar(el, a){
  document.querySelectorAll('.avatar-picker .avatar-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  profileAvatarChoice = a;
}

async function saveProfile(){
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  if(!name){ toast('Naam khali nahi ho sakta'); return; }
  const patch = {name, bio};
  if(profileAvatarChoice) patch.avatar = profileAvatarChoice;
  try{
    await db.collection('users').doc(currentUser.uid).update(patch);
    Object.assign(currentUser, patch);
    await markTaskDone('t1', true);
    confettiBurst();
    toast('Profile update ho gaya! +20 coins 🎉');
    renderApp();
  }catch(e){ toast('Save nahi hua, internet check karo'); }
}

/* ============ INIT ============ */
app.innerHTML = `<div class="auth-wrap"><div style="text-align:center;font-weight:800;color:#6b7d84;">⏳ Load ho raha hai...</div></div>`;
</script>
</body>
</html>
